<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LikeGirl 后台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <header class="admin-top">
        <div>
          <p class="eyebrow">LikeGirl 原生后台</p>
          <h1>管理后台</h1>
        </div>
        <nav class="admin-actions">
          <a href="/">返回前台</a>
          <button type="button" id="logout-button" hidden>退出登录</button>
        </nav>
      </header>

      <section class="admin-login" id="login-panel">
        <form id="login-form" class="admin-form narrow">
          <label>用户名<input name="username" autocomplete="username" required></label>
          <label>密码<input name="password" type="password" autocomplete="current-password" required></label>
          <button type="submit">登录</button>
          <p class="muted">默认账号：admin / loveww，建议登录后修改。</p>
        </form>
      </section>

      <section class="admin-workspace" id="admin-panel" hidden>
        <aside class="admin-tabs" id="admin-tabs">
          <button type="button" data-tab="site">站点设置</button>
          <button type="button" data-tab="about">关于我们</button>
          <button type="button" data-tab="articles">点点滴滴</button>
          <button type="button" data-tab="photos">恋爱相册</button>
          <button type="button" data-tab="checklist">恋爱清单</button>
          <button type="button" data-tab="messages">留言管理</button>
          <button type="button" data-tab="settings">留言设置</button>
          <button type="button" data-tab="account">账号设置</button>
        </aside>
        <section class="admin-main" id="admin-main"></section>
      </section>
    </main>
    <script src="/admin.js"></script>
  </body>
</html>
